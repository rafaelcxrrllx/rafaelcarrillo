<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect to index with the path encoded as a query param
      const path = window.location.pathname;
      window.location.replace('/?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
